<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="control.js"></script>
    <link rel="stylesheet" href="main.css">
    <link rel="icon" href="images/robot.gif">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div id="heading">
        <h1>Rock Paper Scissors</h1>
        <p>You have 5 rounds to win the game.</p>
    </div>
    <div id="interaction">
        <div id="chosen-choice">
            <div id="computer-choice" class="choice-box">
                <img id="computer-choice-img" src="images/robot.gif" alt="">
            </div>
            <span>VS</span>
            <div id="human-choice" class="choice-box">
                <img id="human-choice-img" src="images/human.gif" alt="" >
            </div>
        </div>
        <div id="result">
            <p id="computer-result">Computer | <span id="computer-score">0</span></p>
            <p id="tie-result">Tie | <span id="tie-score">0</span></p>
            <p id="human-result">Human | <span id="human-score">0</span></p>
        </div>
        <div id="human-choose-box">
            <button id="rock" class="choice-button" value="rock" onclick="playRound(this.value)"><img src="images/rock.png" alt=""></button>
            <button id="paper" class="choice-button" value="paper" onclick="playRound(this.value)"><img src="images/paper.png" alt=""></button>
            <button id="scissors" class="choice-button" value="scissors" onclick="playRound(this.value)"><img src="images/scissors.png" alt=""></button>
        </div>
    </div>
    <div id="game-over">
        <h2>Game Over</h2>
        <p>You have won the game!</p>
        <button id="play-again" onclick="window.location.reload()">Play Again</button>
    </div>
</body>
</html>
