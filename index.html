<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <script src="control.js"></script>
    <link rel="stylesheet" href="main.css">
    <title>Rock Paper Scissors</title>
</head>
<body>
    <div id="heading">
        <h1>Rock Paper Scissors</h1>
        <p>You have 5 rounds to win the game.</p>
    </div>
    <div id="interaction">
        <div id="chosen-choice">
            <div id="human-choice" class="choice-box">
                <img src="" alt="">
            </div>
            <div id="computer-choice" class="choice-box">
                <img src="" alt="">
            </div>
        </div>
        <div id="human-choose-box">
            <button id="rock" class="choice-button"><img src="images/asteroid.png" alt=""></button>
            <button id="paper" class="choice-button"><img src="images/scroll.png" alt=""></button>
            <button id="scissors" class="choice-button"><img src="images/scissors.png" alt=""></button>
        </div>
    </div>

</body>
</html>
